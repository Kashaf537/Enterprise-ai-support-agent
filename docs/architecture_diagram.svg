<svg width="680" height="760" viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Enterprise AI Support Agent architecture</title>
<desc>Streamlit frontend talks to a FastAPI backend, which runs a LangGraph agent workflow that uses an LLM, a RAG knowledge base, tools, and a SQLite database for memory and analytics.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="760" fill="#ffffff"/>
<g font-family="Helvetica, Arial, sans-serif" fill="#2C2C2A">

<!-- Frontend -->
<rect x="240" y="20" width="200" height="56" rx="8" stroke-width="0.5" fill="#E6F1FB" stroke="#185FA5"/>
<text x="340" y="42" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Streamlit frontend</text>
<text x="340" y="60" text-anchor="middle" font-size="12" fill="#185FA5">Chat UI + analytics dashboard</text>

<line x1="340" y1="76" x2="340" y2="116" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="356" y="100" font-size="12" fill="#5F5E5A">HTTP / REST</text>

<!-- FastAPI -->
<rect x="220" y="116" width="240" height="56" rx="8" stroke-width="0.5" fill="#E6F1FB" stroke="#185FA5"/>
<text x="340" y="138" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">FastAPI backend</text>
<text x="340" y="156" text-anchor="middle" font-size="12" fill="#185FA5">Chat, ticket, analytics routes</text>

<line x1="340" y1="172" x2="340" y2="212" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- LangGraph container -->
<rect x="60" y="212" width="560" height="330" rx="20" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
<text x="80" y="242" font-size="14" font-weight="500" fill="#26215C">LangGraph agent workflow</text>
<text x="80" y="260" font-size="12" fill="#3C3489">One node per reasoning step</text>

<!-- Node row 1 -->
<rect x="90" y="280" width="150" height="56" rx="8" stroke-width="0.5" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="165" y="302" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Intent detection</text>
<text x="165" y="320" text-anchor="middle" font-size="12" fill="#0F6E56">Classify request</text>
<line x1="240" y1="308" x2="270" y2="308" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="270" y="280" width="150" height="56" rx="8" stroke-width="0.5" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="345" y="302" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Tool decision</text>
<text x="345" y="320" text-anchor="middle" font-size="12" fill="#0F6E56">Need an action?</text>
<line x1="420" y1="308" x2="450" y2="308" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="450" y="280" width="150" height="56" rx="8" stroke-width="0.5" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="525" y="302" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Tool execution</text>
<text x="525" y="320" text-anchor="middle" font-size="12" fill="#0F6E56">Reset, refund, ticket...</text>

<line x1="165" y1="336" x2="165" y2="376" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M525 336 L525 356 L165 356" fill="none" stroke="#73726c" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Node row 2 -->
<rect x="90" y="376" width="150" height="56" rx="8" stroke-width="0.5" fill="#FAECE7" stroke="#993C1D"/>
<text x="165" y="398" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">RAG retrieval</text>
<text x="165" y="416" text-anchor="middle" font-size="12" fill="#993C1D">Search knowledge base</text>
<line x1="240" y1="404" x2="270" y2="404" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="270" y="376" width="150" height="56" rx="8" stroke-width="0.5" fill="#FAECE7" stroke="#993C1D"/>
<text x="345" y="398" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">Generate response</text>
<text x="345" y="416" text-anchor="middle" font-size="12" fill="#993C1D">LLM + confidence score</text>
<line x1="420" y1="404" x2="450" y2="404" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="450" y="376" width="150" height="56" rx="8" stroke-width="1" fill="#FAEEDA" stroke="#854F0B"/>
<text x="525" y="398" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">Confidence check</text>
<text x="525" y="416" text-anchor="middle" font-size="12" fill="#854F0B">Clarify or escalate</text>

<line x1="525" y1="432" x2="525" y2="452" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M525 452 L165 452 L165 472" fill="none" stroke="#73726c" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="90" y="472" width="510" height="44" rx="8" stroke-width="0.5" fill="#F1EFE8" stroke="#5F5E5A"/>
<text x="345" y="498" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Save memory + log interaction</text>

<line x1="345" y1="542" x2="345" y2="582" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Supporting services row -->
<rect x="40" y="582" width="160" height="56" rx="8" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
<text x="120" y="604" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">Groq LLM</text>
<text x="120" y="622" text-anchor="middle" font-size="12" fill="#534AB7">Llama 3.3 70B</text>

<rect x="220" y="582" width="160" height="56" rx="8" stroke-width="0.5" fill="#FAECE7" stroke="#993C1D"/>
<text x="300" y="604" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">ChromaDB</text>
<text x="300" y="622" text-anchor="middle" font-size="12" fill="#993C1D">Vector store</text>

<rect x="400" y="582" width="160" height="56" rx="8" stroke-width="0.5" fill="#F1EFE8" stroke="#5F5E5A"/>
<text x="480" y="604" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">SQLite</text>
<text x="480" y="622" text-anchor="middle" font-size="12" fill="#5F5E5A">Memory, tickets, logs</text>

<line x1="120" y1="638" x2="120" y2="660" stroke="#73726c" stroke-width="0.5" opacity="0.4"/>
<line x1="300" y1="638" x2="300" y2="660" stroke="#73726c" stroke-width="0.5" opacity="0.4"/>
<line x1="480" y1="638" x2="480" y2="660" stroke="#73726c" stroke-width="0.5" opacity="0.4"/>
<text x="340" y="678" text-anchor="middle" font-size="12" fill="#5F5E5A">Called by the agent workflow above</text>

<text x="340" y="722" text-anchor="middle" font-size="12" fill="#5F5E5A">Knowledge base markdown files: FAQ, API docs, pricing, troubleshooting, refunds, policies</text>
</g>
</svg>
